<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Resource hints: every flag in the app loads from flagcdn. Telling the
         browser to start the TLS handshake early shaves ~100-200ms off
         first-flag-load on cold connections. Helps LCP / Core Web Vitals. -->
    <link rel="preconnect" href="https://flagcdn.com" crossorigin />
    <link rel="dns-prefetch" href="https://flagcdn.com" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />

    <title>WCKO — World Cup 2026 Bracket Predictor & Path Visualizer</title>
    <meta name="description" content="Free interactive World Cup 2026 bracket predictor. Drag teams through every knockout round, see your team's path to the Final, share scenarios with friends. Live bookmaker odds, no signup." />
    <link rel="canonical" href="https://wcko.io/" />

    <!-- Open Graph / social -->
    <meta property="og:site_name" content="WCKO" />
    <meta property="og:title" content="WCKO — World Cup 2026 Bracket Predictor" />
    <meta property="og:description" content="Free interactive World Cup 2026 bracket predictor. Drag teams through every knockout round, see your team's path to the Final, share scenarios with friends." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wcko.io/" />
    <meta property="og:image" content="https://wcko.io/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="pt_PT" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WCKO — World Cup 2026 Bracket Predictor" />
    <meta name="twitter:description" content="Drag teams through every knockout round, see your team's path to the Final. Live bookmaker odds, no signup." />
    <meta name="twitter:image" content="https://wcko.io/og.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Structured data: WebSite (helps Google understand the site name + search-action shape) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "WCKO",
      "alternateName": "WCKO — World Cup Knockout Bracket Predictor",
      "url": "https://wcko.io/",
      "description": "Free interactive World Cup 2026 bracket predictor. Drag teams through every knockout round, see your team's path to the Final.",
      "inLanguage": ["en", "es", "fr", "pt"],
      "publisher": {
        "@type": "Organization",
        "name": "WCKO",
        "url": "https://wcko.io/",
        "logo": "https://wcko.io/icon-192.png"
      }
    }
    </script>

    <!-- Disclaimer (informational, not rendered) -->
    <meta name="legal" content="Not affiliated with or endorsed by FIFA." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
