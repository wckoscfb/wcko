name: Refresh WC odds

# Refresh src/data/wc-win-prob.json from The Odds API every 6 hours.
# When the file changes, the commit triggers Cloudflare Pages auto-deploy
# and the live site picks up new probabilities within ~90 seconds.

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours, at minute 0
  workflow_dispatch:        # also allow manual trigger from the Actions tab

# Required so the workflow can push the updated JSON back to the repo
permissions:
  contents: write

# Opt into the new Node 24 runtime for action internals — silences the
# "Node 20 actions are deprecated" warning. Doesn't change which Node version
# our refresh-odds script runs on (that's set explicitly in setup-node below).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22  # current LTS as of mid-2026

      - name: Refresh odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/refresh-odds.mjs

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/wc-win-prob.json
          if git diff --staged --quiet; then
            echo "No changes — odds unchanged since last refresh."
          else
            git commit -m "chore(odds): refresh WC win probabilities from The Odds API"
            git push
            echo "✓ Pushed updated odds; Cloudflare will redeploy."
          fi
